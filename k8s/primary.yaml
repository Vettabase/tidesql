apiVersion: v1
kind: ConfigMap
metadata:
  name: tidesdb-primary-config
  namespace: tidesql
data:
  tidesdb.cnf: |
    [mariadb]
    plugin-load-add=ha_tidesdb.so

    # Object store
    tidesdb_object_store_backend=S3
    tidesdb_s3_endpoint=s3.amazonaws.com
    tidesdb_s3_bucket=tidesdb-production
    tidesdb_s3_region=us-east-1
    tidesdb_s3_access_key=REPLACE_WITH_ACCESS_KEY
    tidesdb_s3_secret_key=REPLACE_WITH_SECRET_KEY
    tidesdb_s3_use_ssl=ON
    tidesdb_s3_path_style=OFF
    tidesdb_objstore_local_cache_max=536870912
    tidesdb_objstore_wal_sync_threshold=1048576
    tidesdb_objstore_wal_sync_on_commit=OFF

    # Engine tuning
    tidesdb_unified_memtable=ON
    tidesdb_unified_memtable_write_buffer_size=134217728
    tidesdb_block_cache_size=268435456
    tidesdb_flush_threads=4
    tidesdb_compaction_threads=4
    tidesdb_log_level=INFO
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tidesql-primary
  namespace: tidesql
spec:
  serviceName: tidesql-primary
  replicas: 1
  selector:
    matchLabels:
      app: tidesql
      role: primary
  template:
    metadata:
      labels:
        app: tidesql
        role: primary
    spec:
      containers:
        - name: mariadb
          image: tidesdb/tidesql:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              mkdir -p /etc/mysql/custom && cp /opt/tidesdb-config/tidesdb.cnf /etc/mysql/custom/tidesdb-k8s.cnf
              exec /usr/local/bin/tidesql-entrypoint.sh
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: config
              mountPath: /opt/tidesdb-config/tidesdb.cnf
              subPath: tidesdb.cnf
            - name: data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: ["mariadb-admin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mariadb", "-h", "localhost", "-e", "SELECT 1"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: tidesdb-primary-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tidesql-primary
  namespace: tidesql
spec:
  type: ClusterIP
  selector:
    app: tidesql
    role: primary
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
